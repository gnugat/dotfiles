# File: /501-aerospace/config/aerospace.toml
# ──────────────────────────────────────────────────────────────────────────────
# 🌠 AeroSpace
# ──────────────────────────────────────────────────────────────────────────────

## ─────────────────────────────────────────────────────────────────────────────
## Start AeroSpace at login to macOS user sesion.
## ─────────────────────────────────────────────────────────────────────────────
start-at-login = true

## ─────────────────────────────────────────────────────────────────────────────
## Commands to run after AeroSpace started.
## ─────────────────────────────────────────────────────────────────────────────
after-startup-command = [
    ## SketchyBar
    'exec-and-forget sketchybar --reload ~/.config/sketchybar/sketchybarrc',
    ## Skhd
    'exec-and-forget skhd --start-service',
]

## ─────────────────────────────────────────────────────────────────────────────
## Workspace change notifications.
## ─────────────────────────────────────────────────────────────────────────────
exec-on-workspace-change = [
    ## SketchyBar
    '/bin/bash',
    '-c',
    'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE',
]

## ─────────────────────────────────────────────────────────────────────────────
## Default layout.
##
## Possible values: tiles|accordion
## ─────────────────────────────────────────────────────────────────────────────
default-root-container-layout = 'accordion'

## ─────────────────────────────────────────────────────────────────────────────
## Gaps between:
## - `inner-*`: windows
## - `outer-*`: monitor edges
## ─────────────────────────────────────────────────────────────────────────────
[gaps]
    inner.horizontal = 10
    inner.vertical = 10
    outer.left = 10
    outer.bottom = 10
    outer.top = 10
    outer.right = 10

## ─────────────────────────────────────────────────────────────────────────────
## 'main' binding mode declaration
##
## All possible keys:
## - letters: a, b, c, ..., z
## - numbers: 0, 1, 2, ..., 9
## - F-keys: f1, f2, ..., f20
## - punctuations: comma, period, slash, semicolon, quote, backslash,
##                 leftSquareBracket, rightSquareBracket, minus, equal, backtick
## - special keys: space, enter, backspace, tab, esc
## - arrows: left, down, up, right
##
## All possible modifiers: cmd, alt, ctrl, shift
##
## Conventions used:
## - vim-like: hjkl for Left, Down, Up, Right (LDUR)
## - modifiers:
##     - alt: main modifier
##     - alt-shift: secondary modifier
## - keys:
##     - number: workspace
##     - letter: N/A (reserved for skhd)
##     - punctuation: AeroSpace command
##
## See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
## ─────────────────────────────────────────────────────────────────────────────
[mode.main.binding]
    ### ────────────────────────────────────────────────────────────────────────
    ### Change the layout of the focused window.
    ###
    ### Toggle orientation - horizontal / vertical:
    ### - `Option ⌥` + `,`
    ### Toggle tiling layout - tiles / accordion:
    ### - `Option ⌥` + `.`
    ### Toggle mode - tiling / floating:
    ### - `Option ⌥` + `/`
    ###
    ### See: https://nikitabobko.github.io/AeroSpace/commands#layout
    ### ────────────────────────────────────────────────────────────────────────
    alt-comma = 'layout horizontal vertical'
    alt-period= 'layout tiles accordion'
    alt-slash = 'layout tiling floating'

    ### ────────────────────────────────────────────────────────────────────────
    ### Resize tile.
    ###
    ### - `Option ⌥` + `-`: decrease size
    ### - `Option ⌥` + `Shift ⇧` + `=`: increase size
    ###
    ### See: https://nikitabobko.github.io/AeroSpace/commands#resize
    ### ────────────────────────────────────────────────────────────────────────
    alt-minus = 'resize smart -50'
    alt-shift-equal = 'resize smart +50'

    ### ────────────────────────────────────────────────────────────────────────
    ### Switch to Tile (focus to):
    ### - `Option ⌥` + `h`, `j`, `k`, `l` (LDUR)
    ###
    ### See: https://nikitabobko.github.io/AeroSpace/commands#focus
    ### ────────────────────────────────────────────────────────────────────────
    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    ### ────────────────────────────────────────────────────────────────────────
    ### Move Tile:
    ### - `Option ⌥` + `Shift ⇧` + `h`, `j`, `k`, `l` (LDUR)
    ###
    ### See: https://nikitabobko.github.io/AeroSpace/commands#move
    ### ────────────────────────────────────────────────────────────────────────
    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    ### ────────────────────────────────────────────────────────────────────────
    ### Switch to Workspace:
    ### - `Option ⌥` + `1`, `2`, `4`, `5`, ...
    ###
    ### See: https://nikitabobko.github.io/AeroSpace/commands#workspace
    ### ────────────────────────────────────────────────────────────────────────
    alt-1 = ['workspace 1', 'exec-and-forget ~/.dotfiles/501-aerospace/bin/as-launch-if-not-running.sh Alacritty'] # Terminal
    alt-2 = 'workspace 2' # IDE
    # alt-3 is used for... typing the `#` character.
    alt-4 = 'workspace 4' # Testing
    alt-5 = 'workspace 5' # Browser
    alt-6 = ['workspace 6', 'exec-and-forget ~/.dotfiles/501-aerospace/bin/as-launch-if-not-running.sh Slack'] # Communication
    alt-7 = ['workspace 7', 'exec-and-forget ~/.dotfiles/501-aerospace/bin/as-launch-if-not-running.sh Spotify'] # Music
    alt-d = ['workspace d', 'exec-and-forget ~/.dotfiles/501-aerospace/bin/as-launch-if-not-running.sh Discord'] # Discord

    ### ────────────────────────────────────────────────────────────────────────
    ### Move Tile to Workspace:
    ### - `Option ⌥` + `Shift ⇧` + `1`, `2`, `4`, `5`, ...
    ###
    ### See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
    ### ────────────────────────────────────────────────────────────────────────
    alt-shift-1 = 'move-node-to-workspace --focus-follows-window 1'
    alt-shift-2 = 'move-node-to-workspace --focus-follows-window 2'
    # alt-3 is used for... typing the `#` character.
    alt-shift-4 = 'move-node-to-workspace --focus-follows-window 4'
    alt-shift-5 = 'move-node-to-workspace --focus-follows-window 5'
    alt-shift-6 = 'move-node-to-workspace --focus-follows-window 6'
    alt-shift-7 = 'move-node-to-workspace --focus-follows-window 7'
    alt-shift-d = 'move-node-to-workspace --focus-follows-window d'

## ─────────────────────────────────────────────────────────────────────────────
## On open, move an application tile to its workspace:
## 1. Shell (Alacritty)
## 2. IDE (PhpStorm, Docker Desktop, Rancher, Orbstack, 1Password, ...)
## 3. is used for... typing the `#` character.
## 4. Testing
## 5. Browser (Chrome)
## 6. Communication (Slack)
## 7. Music (Spotify)
## d. Discord
##
## Use command `aerospace list-apps` to find the app ID to use.
## ─────────────────────────────────────────────────────────────────────────────
[[on-window-detected]]
if.app-id = 'org.alacritty'
run = ['move-node-to-workspace 1']

[[on-window-detected]]
if.app-id = 'com.jetbrains.PhpStorm'
run = ['move-node-to-workspace 2']

[[on-window-detected]]
if.app-id = 'io.rancherdesktop.app'
run = ['move-node-to-workspace 2']

[[on-window-detected]]
if.app-id = 'com.1password.1password'
run = ['move-node-to-workspace 2']

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = ['move-node-to-workspace 5']

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = ['move-node-to-workspace 6']

[[on-window-detected]]
if.app-id = 'com.hnc.Discord'
run = ['move-node-to-workspace d']

[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = ['move-node-to-workspace 7']

## ─────────────────────────────────────────────────────────────────────────────
## On open, make window as floating one:
## - Testing: BumbleHotkeys
## - VPN: Cisco Secure Client
## ─────────────────────────────────────────────────────────────────────────────
[[on-window-detected]]
if.app-id = 'com.bumble.BumbleHotkeys'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.cisco.secureclient.gui'
run = ['layout floating']
